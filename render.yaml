services:
  - type: web
    name: easypdf-pro
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && cd web && npm install && npm run build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
