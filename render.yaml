services:
  - type: web
    name: easypdf-pro
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && cd ../web && npm install && npm run build
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
